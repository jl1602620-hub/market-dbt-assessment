version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_product
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_seller
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_address
    columns:
      - name: address_id
        tests:
          - not_null
          - unique

  - name: fact_orders
    columns:
      - name: order_line_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id

      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id

      - name: seller_id
        tests:
          - relationships:
              to: ref('dim_seller')
              field: seller_id

      - name: address_id
        tests:
          - relationships:
              to: ref('dim_address')
              field: address_id
